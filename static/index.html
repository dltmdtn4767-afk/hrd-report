<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRD 만족도 결과보고서 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- 헤더 -->
        <header class="header">
            <div class="header-left">
                <div class="logo">📊</div>
                <div>
                    <h1>HRD 결과보고서 생성기</h1>
                    <p class="subtitle">AI 기반 만족도 보고서 자동 생성</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-ghost" onclick="showSamples()">📁 샘플 관리</button>
            </div>
        </header>

        <!-- AI 상태 배지 -->
        <div id="aiStatusBadge" class="ai-status disconnected">
            <span class="dot"></span> 상태 확인 중...
        </div>

        <!-- 메인 컨텐츠 -->
        <main class="main">
            <!-- Step 1: 업로드 -->
            <section id="step-upload" class="step active">
                <div class="step-header">
                    <span class="step-num">1</span>
                    <h2>엑셀 데이터 업로드</h2>
                </div>
                <div class="drop-zone" id="dropZone">
                    <div class="drop-icon">📂</div>
                    <p class="drop-text">엑셀 파일을 끌어다 놓거나 클릭하여 선택</p>
                    <p class="drop-hint">.xlsx 파일 지원</p>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
                </div>
                <div id="sheetSelector" class="sheet-selector hidden">
                    <label>시트 선택:</label>
                    <select id="sheetSelect"></select>
                    <button class="btn-primary" onclick="analyzeData()">🔍 AI 분석 시작</button>
                </div>
            </section>

            <!-- Step 2: AI 분석 결과 -->
            <section id="step-analysis" class="step hidden">
                <div class="step-header">
                    <span class="step-num">2</span>
                    <h2>AI 분석 결과</h2>
                </div>
                <div class="analysis-grid">
                    <div class="card summary-card">
                        <h3>📋 데이터 요약</h3>
                        <div id="dataSummary"></div>
                    </div>
                    <div class="card ai-card">
                        <h3>🤖 AI 추론 결과</h3>
                        <div id="aiResult"></div>
                    </div>
                </div>
                <div class="card slides-card">
                    <h3>📑 권장 슬라이드 구성</h3>
                    <div id="slideStructure"></div>
                </div>
                <div class="action-bar">
                    <button class="btn-secondary" onclick="goBack(1)">← 다시 업로드</button>
                    <button class="btn-primary btn-large" onclick="generateReport()">
                        ✨ 보고서 생성하기
                    </button>
                </div>
            </section>

            <!-- Step 3: 미리보기 + 수정 -->
            <section id="step-preview" class="step hidden">
                <div class="step-header">
                    <span class="step-num">3</span>
                    <h2>보고서 미리보기 & 검토</h2>
                </div>
                <div class="preview-layout">
                    <div class="preview-main">
                        <div class="slide-viewer">
                            <div class="slide-nav">
                                <button class="btn-icon" onclick="prevSlide()">◀</button>
                                <span id="slideCounter">1 / 1</span>
                                <button class="btn-icon" onclick="nextSlide()">▶</button>
                            </div>
                            <div class="slide-content" id="slideContent"></div>
                        </div>
                        <div class="slide-thumbnails" id="slideThumbnails"></div>
                    </div>
                    <div class="preview-sidebar">
                        <div class="card review-card">
                            <h3>✅ AI 검증 결과</h3>
                            <div id="reviewResult"></div>
                        </div>
                        <div class="card chat-card">
                            <h3>💬 수정 요청</h3>
                            <div class="chat-messages" id="chatMessages"></div>
                            <div class="chat-input">
                                <input type="text" id="modifyInput" placeholder="수정 사항을 입력하세요..."
                                       onkeydown="if(event.key==='Enter') sendModification()">
                                <button class="btn-primary" onclick="sendModification()">전송</button>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-secondary" onclick="regenerate()">🔄 재생성</button>
                            <button class="btn-primary btn-large" onclick="downloadReport()">
                                📥 PPT 다운로드
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 샘플 모달 -->
        <div id="sampleModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📁 샘플 보고서 관리</h2>
                    <button class="btn-icon" onclick="closeSamples()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="drop-zone drop-zone-small" id="sampleDropZone">
                        <p>새 샘플 PPT를 끌어다 놓으세요</p>
                        <input type="file" id="sampleInput" accept=".pptx" hidden>
                    </div>
                    <div id="sampleList"></div>
                </div>
            </div>
        </div>

        <!-- 로딩 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loadingText">분석 중...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
