<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRD 결과보고서 데이터 분석기 | Expert Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📊</span>
      <div>
        <div class="logo-title">HRD 결과보고서 분석기</div>
        <div class="logo-sub">Expert Consulting</div>
      </div>
    </div>
    <div class="header-status" id="aiStatus">
      <span class="dot dot-off"></span> AI 미연결
    </div>
  </div>
</header>

<!-- UPLOAD ZONE -->
<section class="upload-section" id="uploadSection">
  <div class="upload-card">
    <div class="upload-icon">📂</div>
    <h2>로우데이터 엑셀 업로드</h2>
    <p>시트마다 차수가 구분된 만족도 로우데이터를 업로드하세요.<br>모든 시트를 자동으로 분석합니다.</p>
    <label class="upload-btn" for="fileInput">
      파일 선택 (xlsx, xls)
      <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
    </label>
    <div class="upload-progress" id="uploadProgress" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">분석 중...</div>
    </div>
  </div>
</section>

<!-- MAIN DASHBOARD -->
<main class="dashboard" id="dashboard" style="display:none">

  <!-- 과정 헤더 -->
  <div class="course-header" id="courseHeader">
    <div class="course-title-area">
      <h1 id="courseTitle">과정명</h1>
      <div class="course-meta" id="courseMeta"></div>
    </div>
    <div class="session-badges" id="sessionBadges"></div>
    <div class="header-actions">
      <button class="ppt-btn" id="pptBtn">📥 PPT 보고서 생성</button>
      <button class="reset-btn" id="resetBtn">새 파일</button>
    </div>
  </div>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="overview">📋 개요</button>
    <button class="tab-btn" data-tab="quant">📊 정량 평가</button>
    <button class="tab-btn" data-tab="qual">💬 정성 평가</button>
  </nav>

  <!-- TAB: 개요 -->
  <div class="tab-content active" id="tab-overview">
    <div class="section-card">
      <div class="section-header">
        <h3>과정 개요</h3>
        <button class="copy-btn" data-target="overviewTable">복사</button>
      </div>
      <table class="info-table" id="overviewTable">
        <tbody id="overviewBody"></tbody>
      </table>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- TAB: 정량 평가 -->
  <div class="tab-content" id="tab-quant">
    <!-- 차수 선택 탭 -->
    <div class="session-tabs" id="sessionTabs"></div>

    <!-- 종합 현황 -->
    <div class="section-card" id="quantSummaryCard">
      <div class="section-header">
        <h3 id="quantSummaryTitle">정량 평가 종합</h3>
        <button class="copy-btn" data-target="quantSummaryTable">복사</button>
      </div>
      <div class="chart-table-wrap">
        <div class="chart-wrap">
          <canvas id="summaryChart"></canvas>
        </div>
        <div class="table-wrap">
          <table class="score-table" id="quantSummaryTable">
            <thead>
              <tr>
                <th>영역</th>
                <th>평균</th>
                <th>평가</th>
              </tr>
            </thead>
            <tbody id="quantSummaryBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 문항별 상세 -->
    <div class="section-card">
      <div class="section-header">
        <h3>문항별 상세 결과</h3>
        <div class="detail-toolbar">
          <button class="sel-btn" id="selectModeBtn" onclick="toggleSelectMode()">☑ 선택 모드</button>
          <button class="export-btn" id="exportExcelBtn" onclick="exportToExcel()" style="display:none">📊 Excel 내보내기</button>
          <button class="export-btn secondary" id="exportClipBtn" onclick="exportToClipboard()" style="display:none">📋 클립보드 복사</button>
          <button class="copy-btn" data-target="quantDetailTable">표 복사</button>
        </div>
      </div>
      <div class="select-hint" id="selectHint" style="display:none">
        💡 차트 막대를 클릭하여 원하는 문항을 선택하세요. 선택 후 Excel로 내보낼 수 있습니다.
      </div>
      <div id="selectedCount" style="display:none" class="selected-count"></div>
      <div class="chart-wrap wide">
        <canvas id="detailChart"></canvas>
      </div>
      <table class="score-table" id="quantDetailTable">
        <thead>
          <tr>
            <th width="30"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
            <th>번호</th>
            <th>문항</th>
            <th>평균</th>
            <th>응답수</th>
          </tr>
        </thead>
        <tbody id="quantDetailBody"></tbody>
      </table>
    </div>

    <!-- 차수별 비교 (멀티세션) -->
    <div class="section-card" id="sessionCompareCard" style="display:none">
      <div class="section-header">
        <h3>차수별 비교</h3>
        <button class="copy-btn" data-target="sessionCompareTable">복사</button>
      </div>
      <div class="chart-wrap">
        <canvas id="sessionChart"></canvas>
      </div>
      <table class="score-table" id="sessionCompareTable">
        <thead id="sessionCompareHead"></thead>
        <tbody id="sessionCompareBody"></tbody>
      </table>
    </div>
  </div>

  <!-- TAB: 정성 평가 -->
  <div class="tab-content" id="tab-qual">
    <div id="qualLoading" class="loading-msg" style="display:none">
      <div class="spinner"></div>
      <span>공통응답 분석 중...</span>
    </div>
    <div id="qualContent"></div>
    <div class="empty-msg" id="qualEmpty" style="display:none">
      주관식 문항이 없습니다.
    </div>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
